# Astra2 configuration (TOML)
[stream.depth]
# Use a profile index (0, 1, 2...). Set to -1 to use width/height/fps.
profile_index = 2
# Set width/height/fps to 0 to ignore.
width = 0
height = 0
fps = 0
format = "Y16"

[stream.color]
# Use a profile index (0, 1, 2...). Set to -1 to use width/height/fps.
profile_index = 1
# Set width/height/fps to 0 to ignore.
width = 0
height = 0
fps = 0
format = "RGB"

[filters.decimation]
enabled = false
# Set scale_value to 0 to use the SDK default.
scale_value = 0

[filters.disparity]
enabled = true

[filters.spatial]
enabled = false
alpha = 0.5
diff_threshold = 160
magnitude = 1
radius = 1

[filters.temporal]
enabled = false
diff_scale = 0.1
weight = 0.4

[filters.hole_filling]
enabled = false
mode = "NEAREST"

[filters.threshold]
enabled = true
min = 600
max = 1000
